services:
  nginx:
    image: nginx:1.27-alpine
    container_name: infra-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
  app1:
    build:
      context: ./app
    container_name: infra-app1
    environment:
      APP_NAME: app1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
  app2:
    build:
      context: ./app
    container_name: infra-app2
    environment:
      APP_NAME: app2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s